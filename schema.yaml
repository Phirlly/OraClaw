title: "OpenClaw on OCI: Always Free Compute (HTTPS on-instance)"

description: |
  Deploys OpenClaw Gateway on an OCI Always Free compute instance.

  HTTPS is terminated on the instance using an auto-generated self-signed certificate.

  Entry points:
  - https://<INSTANCE_PUBLIC_IP>/healthz
  - https://<INSTANCE_PUBLIC_IP>/login

schemaVersion: 1.1.0
locale: "en"

variableGroups:
  - title: "Tenancy"
    variables:
      - tenancy_ocid

  - title: "Location"
    variables:
      - region

  - title: "Target Compartment"
    variables:
      - compartment_ocid

  - title: "Compute (defaults target Always Free)"
    variables:
      - instance_display_name
      - oracle_linux_version
      - compute_shape
      - compute_ocpus
      - compute_memory_gbs
      - ssh_public_key

  - title: "OCI OpenAI Proxy (optional override)"
    variables:
      - oci_openai_proxy_models_json_override

  - title: "Advanced (optional)"
    variables:
      - vcn_cidr
      - public_subnet_cidr
      - private_subnet_cidr

variables:
  tenancy_ocid:
    type: oci:identity:tenancy:id
    title: "Tenancy OCID"
    required: true

  region:
    type: oci:identity:region:name
    title: "Region"
    required: true

  compartment_ocid:
    type: oci:identity:compartment:id
    title: "Compartment OCID"
    required: true

  instance_display_name:
    type: string
    title: "Instance name"
    required: true
    default: "openclaw"

  oracle_linux_version:
    type: string
    title: "Oracle Linux major version"
    required: true
    default: "9"

  compute_shape:
    type: string
    title: "Compute shape"
    required: true
    default: "VM.Standard.A1.Flex"

  compute_ocpus:
    type: number
    title: "OCPUs"
    required: true
    default: 1

  compute_memory_gbs:
    type: number
    title: "Memory (GB)"
    required: true
    default: 6

  ssh_public_key:
    type: oci:core:ssh:publickey
    title: "SSH public key"
    description: "Drop a .pub file or paste a public key."
    required: true
    default: ""

  oci_openai_proxy_models_json_override:
    type: string
    title: "Override models.json (optional)"
    required: false
    default: ""

  vcn_cidr:
    type: string
    title: "VCN CIDR"
    required: true
    default: "10.0.0.0/16"

  public_subnet_cidr:
    type: string
    title: "Public subnet CIDR"
    required: true
    default: "10.0.1.0/24"

  private_subnet_cidr:
    type: string
    title: "Private subnet CIDR"
    required: true
    default: "10.0.2.0/24"
